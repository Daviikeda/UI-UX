<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloko Tracking</title>
    <link rel="stylesheet" href="./variables.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div class="navbar"></div>
    </header>

    <main>
        <div class="content">
            <div class="introduction">
                <div class="form-container">
                    <h1 class="title">Monitoramento em Tempo Real</h1>
                    <p class="title-legend">Acesse o painel de telemetria da sua frota. Acompanhe rotas, alertas e
                        manutenções em um só lugar.</p>
                    <form action="" method="post">
                        <div class="form-inputs-container">
                            <input type="text" name="cnpj" id="cnpj" placeholder="CNPJ da Empresa">
                            <input type="password" name="password" id="password" placeholder="Senha">
                            <button type="submit" class="btn-login">Entrar</button>
                        </div>
                    </form>
                </div>

                <div class="image-container"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer"></div>
    </footer>
</body>

</html>
